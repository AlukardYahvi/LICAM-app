                                        <div className="flex items-center justify-between w-[380px] bg-slate-900 text-white px-5 py-2 rounded-t-xl font-bold text-sm shadow-xl border-b-2 border-slate-700">
                                            <div className="flex items-center gap-3"><div className="w-4 h-4 bg-black rounded-full border-2 border-slate-500 shadow"></div>CÁTODO (-) NEGRO</div>
                                        </div>
                                        <div className="relative w-[380px] h-[360px] bg-slate-200 border-x-[6px] border-slate-400 shadow-[inset_0_-15px_30px_rgba(0,0,0,0.2)] flex justify-center pt-8">
                                            {(chamberState==='has_buffer'||chamberState==='lid_on'||chamberState==='running'||chamberState==='done') && <div className="absolute inset-0 bg-blue-500/20 mix-blend-multiply z-0 transition-all duration-1000"></div>}
                                            
                                            {chamberState !== 'empty' && (
                                                <div className="relative w-[280px] h-[280px] glass-effect border-2 border-white/60 z-10 flex justify-center pt-5 shadow-sm rounded-sm">
                                                    {/* Pocillos e interaccion */}
                                                    <div className="flex justify-around w-full px-5 absolute top-5 z-20">
                                                        {[0,1,2,3].map(idx => (
                                                            <div key={idx} onClick={(e) => { e.stopPropagation(); handleWell(idx); }} className={`w-12 h-6 border-[3px] rounded-sm cursor-pointer transition-all ${activeTool==='P20'&&liquidInTip.vol>0&&!wells[idx]?'border-green-400 bg-green-100/50 animate-pulse':'border-slate-400 shadow-inner'}`}>
                                                                {wells[idx] && <div className={`w-full h-full opacity-80 rounded-sm ${wells[idx]==='ladder'?'bg-purple-600':wells[idx]==='sample_dyed'?'bg-blue-600':'bg-transparent'}`}></div>}
                                                            </div>
                                                        ))}
                                                    </div>
                                                    {/* Bandas */}
                                                    <div className="w-full h-full relative mt-5">
                                                        {wells.map((type, idx) => type && <div key={idx} className={`absolute w-12 opacity-70 rounded-sm dna-band blur-[1px] ${type==='ladder'?'bg-purple-500':type==='sample_dyed'?'bg-blue-600':'bg-transparent'}`} style={{ left: `${(idx*25)+6}%`, top: `${runProgress*2.1}px`, height:'10px'}}></div>)}
                                                    </div>
                                                </div>
                                            )}

                                            {/* Tapa Puesta */}
                                            {(chamberState==='lid_on'||chamberState==='running'||chamberState==='done') && (
                                                <div className="absolute inset-0 bg-slate-800/10 backdrop-blur-[2px] z-30 border-[10px] border-slate-500/80 flex flex-col justify-between p-2 shadow-inner pointer-events-none">
                                                    <div className="w-full flex justify-center"><div className="w-8 h-8 bg-black rounded-full shadow-lg border-2 border-slate-400"></div></div>
                                                    <div className="w-full flex justify-center"><div className="w-8 h-8 bg-red-600 rounded-full shadow-lg border-2 border-slate-400"></div></div>
                                                </div>
                                            )}
                                        </div>
                                        <div className="flex items-center justify-between w-[380px] bg-red-100 text-red-900 px-5 py-2 rounded-b-xl font-bold text-sm shadow-xl border-t-2 border-red-300">
                                            <div className="flex items-center gap-3"><div className="w-4 h-4 bg-red-600 rounded-full border-2 border-red-800 shadow"></div>ÁNODO (+) ROJO</div>
                                        </div>
                                        <span className="text-xs font-black mt-4 bg-white text-slate-800 px-4 py-1 rounded shadow-lg border border-slate-300">Cámara de Electroforesis</span>
                                    </div>
                                )}

                                {/* TRANSILUMINADOR - Fase Final */}
                                {currentStep === STEPS.UV && <SVGTransilluminator />}

                            </div>
                        </div>

                        {/* MESA INFERIOR (z-30) */}
                        <div className="absolute bottom-0 w-full flex flex-col z-30 pointer-events-auto">
                            <div className="w-full h-[150px] bg-[#94a3b8] border-t-[10px] border-[#64748b] flex justify-between items-end pb-4 px-12 shadow-[inset_0_20px_20px_rgba(0,0,0,0.1)] gap-8">
                                
                                {/* Pipeta, Caja de Puntas y Basura (Activos en Fase 7) */}
                                {(currentStep === STEPS.LOAD) && (
                                    <>
                                        <div className="flex gap-10 items-end">
                                            {/* Pipeta en mesa */}
                                            <div className="relative w-28 h-28 flex flex-col items-center justify-end pb-2">
                                                <SVGPipette isRack={true} />
                                            </div>
                                            
                                            {/* Caja de Puntas animada */}
                                            <div className="relative w-36 h-28 flex flex-col items-center justify-end pb-4">
                                                <SVGTipBoxInteractive isOpen={isTipBoxOpen} onClick={handleTipBox} isTarget={nextTarget==='tipbox'} />
                                            </div>

                                            {/* Gradilla */}
                                            <div className="flex flex-col items-center mb-3">
                                                <span className="text-[10px] font-bold text-slate-200 uppercase tracking-widest mb-2 bg-slate-700 px-3 py-0.5 rounded shadow">Gradilla de Muestras</span>
                                                <div className="flex gap-5 bg-[#7e8e9f] p-4 rounded-xl border-2 border-[#5c6d80] shadow-inner items-end h-[95px]">
                                                    <SVGEppendorf type="ladder" color="#9333ea" label="Ladder" />
                                                    <SVGEppendorf type="dye" color="#1e3a8a" label="Dye" />
                                                    <SVGEppendorf type="sample" color={samplesDyed ? "#3b82f6" : "#e2e8f0"} label="Muestra" />
                                                </div>
                                            </div>
                                        </div>

                                        <SVGTrashBinRPBI />
                                    </>
                                )}

                                {/* Fuente de poder */}
                                {currentStep === STEPS.RUN && (
                                    <div className="flex gap-4 items-end mb-3">
                                        <div className={`cursor-pointer bg-slate-800 p-5 rounded-2xl shadow-2xl border-2 border-slate-600 text-center transition-all ${nextTarget==='power'?'guide-target scale-105':''}`} onClick={() => interactWithTarget('power')}>
                                            <div className="text-xs text-slate-400 font-mono mb-2 font-bold tracking-widest">POWER SUPPLY</div>
                                            <div className="bg-black text-green-400 font-mono text-4xl px-8 py-2 rounded shadow-inner mb-4 border border-slate-700">{chamberState==='running'?'100V':'000V'}</div>
                                            <button className={`w-full py-2 text-sm font-black rounded-lg shadow-lg uppercase ${chamberState==='running'?'bg-red-500 text-white animate-pulse':'bg-green-500 text-white'}`}>RUN / STOP</button>
                                        </div>
                                    </div>
                                )}
                            </div>
                            <div className="w-full h-16 bg-[#475569] border-t-[3px] border-[#334155] shadow-2xl flex justify-center gap-12 px-10">
                                {[1,2,3].map(i => <div key={i} className="w-56 h-12 mt-2 bg-[#64748b] border border-[#334155] rounded shadow-inner flex justify-center pt-2"><div className="w-24 h-2 bg-[#94a3b8] rounded-full shadow border border-[#475569]"></div></div>)}
                            </div>
                        </div>

                        {/* P20 Modal Vol */}
                        {showVolModal && activeTool === 'P20' && (
                            <div className="absolute inset-0 bg-slate-900/70 z-50 flex items-center justify-center backdrop-blur-sm pointer-events-auto">
                                <div className="bg-white p-8 rounded-3xl shadow-2xl w-80 text-center border-2 border-slate-200">
                                    <h3 className="font-bold text-[#005682] text-2xl mb-6">Ajustar P20</h3>
                                    <div className="flex justify-center items-center gap-6 mb-8">
                                        <button onClick={() => {setTempVol(v => Math.max(2, v-0.5)); AudioEngine.playClick();}} className="w-14 h-14 bg-slate-100 rounded-full font-bold text-3xl hover:bg-slate-200 shadow-md">-</button>
                                        <input type="number" value={tempVol.toFixed(1)} readOnly className="w-24 text-center text-4xl font-mono border-b-4 border-[#005682] outline-none bg-transparent font-bold text-slate-800" />
                                        <button onClick={() => {setTempVol(v => Math.min(20, v+0.5)); AudioEngine.playClick();}} className="w-14 h-14 bg-slate-100 rounded-full font-bold text-3xl hover:bg-slate-200 shadow-md">+</button>
                                    </div>
                                    <button onClick={() => {setPipetteVol(tempVol); setShowVolModal(false); AudioEngine.playClick();}} className="w-full py-4 bg-[#005682] text-white font-bold text-lg rounded-xl shadow-lg hover:bg-[#003b57] transition-colors">Guardar y Cerrar</button>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* -- ÁREA DEL CUADERNO (DERECHA) -- */}
                    <div className="w-[420px] bg-white flex flex-col shadow-[-20px_0_40px_rgba(0,0,0,0.15)] z-40 border-l border-slate-300 pointer-events-auto relative">
                        <div className="bg-notebook-header text-white p-6 flex items-center gap-5 relative overflow-hidden">
                            <div className="absolute -right-4 top-0 opacity-10 scale-150">📘</div>
                            <div className="bg-white/20 p-3 rounded-lg backdrop-blur shadow-sm"><span className="text-3xl">📘</span></div>
                            <div>
                                <div className="text-[10px] font-black text-blue-200 tracking-widest mb-1">SIMULADOR PRO</div>
                                <div className="text-xl font-bold leading-none">Electroforesis de ADN</div>
                            </div>
                        </div>
                        <div className="bg-notebook-sub text-white px-6 py-4 flex items-center justify-between shadow-inner border-y border-slate-800">
                            <div className="flex items-center gap-3">
                                <div className="w-8 h-8 rounded-full border-2 border-white/50 flex items-center justify-center font-bold text-sm">{currentStep}</div>
                                <span className="text-base font-bold tracking-widest uppercase">Protocolo de Laboratorio</span>
                            </div>
                            {/* Puntuación en tiempo real en la libreta */}
                            <div className="flex items-center gap-2 bg-white/20 px-3 py-1 rounded-full">
                                <span className="text-sm font-bold">Puntos:</span>
                                <span className={`font-black text-lg ${score < 70 ? 'text-red-300' : 'text-green-300'}`}>{score}</span>
                            </div>
                        </div>
                        <div className="px-6 py-5 border-b border-slate-200 bg-slate-50 flex items-center gap-4">
                            <div className="flex-1 h-3 bg-slate-200 rounded-full overflow-hidden shadow-inner">
                                <div className="h-full bg-blue-500 transition-all duration-500" style={{ width: `${(completedTasks.length / PROTOCOL_DATA[currentStep].tasks.length) * 100}%` }}></div>
                            </div>
                            <div className="text-sm font-black text-slate-500 bg-white px-3 py-1 rounded-full shadow-md border border-slate-300">
                                {completedTasks.length}/{PROTOCOL_DATA[currentStep].tasks.length}
                            </div>
                        </div>

                        {currentStep === STEPS.UV && completedTasks.length === PROTOCOL_DATA[STEPS.UV].tasks.length ? (
                            <div className="p-6 overflow-y-auto flex-1 flex flex-col animate-fade-in">
                                <div className={`p-6 rounded-2xl border-2 shadow-lg mb-6 ${score >= 90 ? 'bg-green-50 border-green-200' : score >= 70 ? 'bg-yellow-50 border-yellow-200' : 'bg-red-50 border-red-200'}`}>
                                    <h3 className="text-2xl font-black text-center mb-2 text-slate-800">Evaluación Práctica</h3>
                                    <div className="flex justify-center items-center gap-4 mb-4">
                                        <div className="text-5xl">
                                            {score >= 90 ? '🏆' : score >= 70 ? '👍' : '🤔'}
                                        </div>
                                        <div className="text-center">
                                             <div className="text-sm font-bold text-slate-500 uppercase">Puntuación Final</div>
                                             <div className={`text-4xl font-black ${score >= 90 ? 'text-green-600' : score >= 70 ? 'text-yellow-600' : 'text-red-600'}`}>{score} / 100</div>
                                        </div>
                                    </div>
                                     <p className="text-center font-bold text-slate-700 mb-4">
                                        {score >= 90 ? '¡Excelente técnica de electroforesis!' : score >= 70 ? 'Buen trabajo, pero cuida los detalles del protocolo.' : 'Debes practicar más. Revisa los errores abajo.'}
                                    </p>

                                    {penalties.length > 0 && (
                                        <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm mt-4">
                                            <h4 className="font-bold text-red-600 mb-3 flex items-center">⚠️ Errores y Penalizaciones:</h4>
                                            <ul className="space-y-3">
                                                {penalties.map((p, idx) => (
                                                    <li key={idx} className="text-sm border-b border-slate-100 pb-2 last:border-0">
                                                        <div className="flex justify-between font-bold text-slate-800">
                                                            <span>{p.reason}</span>
                                                            <span className="text-red-500">-{p.points} pts</span>
                                                        </div>
                                                         <p className="text-slate-600 mt-1 text-xs italic">💡 {p.advice}</p>
                                                    </li>
                                                ))}
                                            </ul>
                                        </div>
                                    )}
                                </div>

                                <button 
                                    onClick={() => window.location.reload()}
                                    className="w-full bg-[#005682] text-white py-4 rounded-xl font-bold shadow-lg hover:bg-[#003b57] transition-transform hover:scale-105"
                                >
                                    ↻ Reiniciar Práctica Completa
                                </button>
                            </div>
                        ) : (
                            <div className="p-6 overflow-y-auto flex-1 flex flex-col">
                                <div className="bg-slate-100 p-4 rounded-2xl border border-slate-300 mb-6 shadow-inner">
                                    <h3 className="font-bold text-[#005682] text-lg mb-2">{PROTOCOL_DATA[currentStep].title}</h3>
                                    <p className="text-sm text-slate-600 font-medium leading-relaxed">{PROTOCOL_DATA[currentStep].desc}</p>
                                </div>
                                
                                <div className="ml-2 pl-4 border-l-[3px] border-slate-200 flex-1">
                                    {PROTOCOL_DATA[currentStep].tasks.map((task, idx) => {
                                        const isDone = completedTasks.includes(task.id);
                                        const isActive = !isDone && (idx === 0 || completedTasks.includes(PROTOCOL_DATA[currentStep].tasks[idx-1].id));
                                        
                                        return (
                                            <div key={task.id} className={`flex items-start gap-4 mb-6 transition-all duration-300 ${isDone ? 'opacity-40' : isActive ? 'transform translate-x-2' : 'opacity-60'}`}>
                                                <div className={`w-7 h-7 rounded-full flex items-center justify-center text-[11px] font-bold shrink-0 
                                                    ${isDone ? 'bg-green-500 text-white shadow-inner' : isActive ? 'bg-blue-600 text-white shadow-lg ring-4 ring-blue-200' : 'bg-slate-200 text-slate-500'}`}>
                                                    {isDone ? '✓' : String.fromCharCode(97 + idx).toUpperCase()}
                                                </div>
                                                <div className={`text-sm ${isDone ? 'line-through text-slate-400' : 'text-slate-700 font-bold'} flex-1 leading-tight mt-1`}>
                                                    {task.t}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>

                                {completedTasks.length === PROTOCOL_DATA[currentStep].tasks.length && currentStep < STEPS.UV && (
                                    <button onClick={() => {setCurrentStep(p=>p+1); setCompletedTasks([]); setActiveTool(null); setFeedbackMsg(''); AudioEngine.playSuccess();}} className="w-full bg-[#005682] text-white py-4 rounded-xl font-black shadow-xl hover:bg-[#003b57] transition-transform hover:scale-105 text-lg mt-6 border-b-4 border-[#003b57]">
                                        Siguiente Paso ▶
                                    </button>
                                )}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ElectrophoresisSim />);
    </script>
</body>
</html>
